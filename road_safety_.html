<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>રોડ સેફ્ટી ક્વિઝ (Road Safety Quiz)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .progress-bar {
            height: 8px;
            width: 100%;
            background-color: #ecf0f1;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: #27ae60;
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-number {
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #fff;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            color: #34495e;
        }
        .option-btn:hover {
            background-color: #f8f9fa;
            border-color: #3498db;
        }
        .option-btn.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-next {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        .btn-next:hover {
            background-color: #2980b9;
        }
        .result-container {
            text-align: center;
            display: none;
        }
        .result-title {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .score {
            font-size: 40px;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 20px;
        }
        .btn-restart {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-restart:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- ક્વિઝ ચાલુ હશે ત્યારે આ સેક્શન દેખાશે -->
    <div id="quiz-box">
        <h1>રોડ સેફ્ટી જાગૃતિ ક્વિઝ</h1>
        <div class="subtitle">ટ્રાફિક નિયમો અને માર્ગ સલામતી અંગે ટેસ્ટ</div>
        
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        
        <div class="question-number" id="question-num">પ્રશ્ન 1 માંથી 30</div>
        <div class="question-text" id="question-text">પ્રશ્ન લોડ થઈ રહ્યો છે...</div>
        
        <div class="options-container" id="options-container">
            <!-- વિકલ્પો અહીં ડાયનેમિકલી ઉમેરાશે -->
        </div>
        
        <div class="controls">
            <span id="score-counter" style="color: #7f8c8d;">સાચા જવાબો: 0</span>
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">આગળ વધો</button>
        </div>
    </div>

    <!-- ક્વિઝ પૂરી થયા પછી આ સેક્શન દેખાશે -->
    <div id="result-box" class="result-container">
        <div class="result-title">🎉 ક્વિઝ પૂર્ણ થઈ! 🎉</div>
        <div class="score" id="final-score">0 / 30</div>
        <p id="performance-msg" style="font-size: 18px; color: #34495e; margin-bottom: 25px;"></p>
        <button class="btn-restart" onclick="restartQuiz()">ફરીથી પ્રયત્ન કરો</button>
    </div>
</div>

<script>
    // રોડ સેફ્ટીના મહત્વના ૩૦ પ્રશ્નો
    const questions = [
        {
            q: "પીળા રંગની સિગ્નલ લાઈટ શું સૂચવે છે?",
            options: ["વાહન રોકો", "ધીમા પડો અને સાવચેતીપૂર્વક આગળ વધો", "ઝડપથી નીકળી જાઓ", "વાહન ડાબી બાજુ લો"],
            correct: 1
        },
        {
            q: "કયા વાહનોને રોડ પર જવા માટે સર્વપ્રથમ અગ્રતા (Priority) આપવી જોઈએ?",
            options: ["વીઆઈપી કાફલો", "સરકારી લક્ઝરી બસો", "એમ્બ્યુલન્સ અને ફાયર બ્રિગેડ", "ભારે માલવાહક ટ્રક"],
            correct: 2
        },
        {
            q: "રોડ પર દોરેલી તૂટક સફેદ લાઈન શું સૂચવે છે?",
            options: ["ટ્રેક બદલવાની કે ઓવરટેક કરવાની મનાઈ છે", "સાવચેતી રાખીને ટ્રેક બદલી શકાય કે ઓવરટેક કરી શકાય", "વાહન ત્યાં જ ઉભું રાખવું", "માર્ગ વન-વે છે"],

            options: ["માત્ર ચાલકે", "માત્ર પાછળ બેસનાર વ્યક્તિએ", "ચાલક અને પાછળ બેસનાર બંનેએ", "૧૮ વર્ષથી નાની ઉંમરના લોકોએ"],

        },
        {

            options: ["ડ્રાઇવિંગ લાયસન્સ", "વાહનનું રજીસ્ટ્રેશન સર્ટિફિકેટ (RC)", "ઇન્સ્યોરન્સ અને PUC સર્ટિફિકેટ", "વાહન ખરીદ્યાનું ઓરિજિનલ બિલ"],

        },
        {

        },
        {

            options: ["ફરજિયાત અથવા આદેશાત્મક નિયમો (Mandatory)", "માત્ર હાઈવેના માર્ગો", "રસ્તાની આજુબાજુની હોટેલ્સ", "ચેતવણી"],

            options: ["ફાટકની નીચેથી બાઈક કે વાહન કાઢવાનો પ્રયાસ કરવો", "એન્જિન બંધ કરીને રાહ જોવી", "બ્રેક લગાવીને શાંત ઊભા રહેવું", "યોગ્ય અંતરે વાહન રાખવું"],

        {
            q: "વાહનમાં 'PUC' નું પૂરું નામ શું છે?",

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedAnswer = false;

    const quizBox = document.getElementById("quiz-box");
    const resultBox = document.getElementById("result-box");
    const questionNum = document.getElementById("question-num");
    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const nextBtn = document.getElementById("next-btn");
    const progressBar = document.getElementById("progress");
    const scoreCounter = document.getElementById("score-counter");
    const finalScore = document.getElementById("final-score");
    const performanceMsg = document.getElementById("performance-msg");

    function loadQuestion() {
        selectedAnswer = false;
        nextBtn.style.display = "none";
        optionsContainer.innerHTML = "";
        
        const currentQuestion = questions[currentQuestionIndex];
        
        // અપડેટ પ્રશ્ન નંબર અને લખાણ
        questionNum.innerText = `પ્રશ્ન ${currentQuestionIndex + 1} માંથી ${questions.length}`;
        questionText.innerText = currentQuestion.q;
        
        // પ્રોગ્રેસ બાર અપડેટ કરો
        const progressPercentage = ((currentQuestionIndex) / questions.length) * 100;
        progressBar.style.width = `${progressPercentage}%`;

        // વિકલ્પો બતાવો
        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.innerText = option;
            button.classList.add("option-btn");
            button.addEventListener("click", () => selectOption(button, index));
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(selectedBtn, index) {
        if (selectedAnswer) return; // જો એકવાર જવાબ આપી દીધો હોય તો ફરીથી ક્લિક ન થાય
        
        selectedAnswer = true;
        const currentQuestion = questions[currentQuestionIndex];
        const correctIndex = currentQuestion.correct;
        const allButtons = optionsContainer.querySelectorAll(".option-btn");

        if (index === correctIndex) {
            selectedBtn.classList.add("correct");
            score++;
            scoreCounter.innerText = `સાચા જવાબો: ${score}`;
        } else {
            selectedBtn.classList.add("wrong");
            // સાચો જવાબ હાઇલાઇટ કરો
            allButtons[correctIndex].classList.add("correct");
        }

        // 'આગળ વધો' બટન બતાવો
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        progressBar.style.width = "100%";
        quizBox.style.display = "none";
        resultBox.style.display = "block";
        
        finalScore.innerText = `${score} / ${questions.length}`;
        
        let message = "";
        if (score === questions.length) {
            message = "🏆 અદ્ભુત! તમે માર્ગ સલામતીના તમામ નિયમો બરાબર જાણો છો. તમે એક આદર્શ નાગરિક છો!";
        } else if (score >= 25) {
            message = "👍 ખુબ સરસ! તમારું રોડ સેફ્ટી જ્ઞાન ઘણું સારું છે. સુરક્ષિત ડ્રાઇવિંગ કરતા રહો.";
        } else if (score >= 15) {
            message = "⚠️ સારું છે, પણ હજુ વધુ સુધારો કરવાની જરૂર છે. ટ્રાફિક નિયમોનું વધુ કાળજીપૂર્વક પાલન કરો.";
        } else {
            message = "🚨 તમારે ટ્રાફિક નિયમો શીખવાની ઘણી જરૂર છે. રસ્તા પર નીકળો ત્યારે તમારી અને અન્યોની સુરક્ષાનું ધ્યાન રાખો.";
        }
        performanceMsg.innerText = message;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        scoreCounter.innerText = "સાચા જવાબો: 0";
        quizBox.style.display = "block";
        resultBox.style.display = "none";
        loadQuestion();
    }

    // પહેલો પ્રશ્ન લોડ કરો
    loadQuestion();
</script>
