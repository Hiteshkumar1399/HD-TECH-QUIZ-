<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ઓનલાઈન ટેસ્ટ ક્વિઝ</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-sizing: border-box;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }
        .question {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }
        .option-btn:hover {
            background-color: #e8f0fe;
            border-color: #1a73e8;
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
        }
        .wrong {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
        }
        .footer {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .next-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }
        .next-btn:hover {
            background-color: #1557b0;
        }
        .result-card {
            text-align: center;
        }
        .restart-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-box">
        <h2>ઓનલાઈન ક્વિઝ ટેસ્ટ</h2>
        <div class="question" id="question">પ્રશ્ન લોડ થઈ રહ્યો છે...</div>
        <div class="options-container" id="options"></div>
        <div class="footer">
            <span id="progress">પ્રશ્ન 0 / 0</span>
            <button class="next-btn" id="next-btn">આગળનો પ્રશ્ન</button>
        </div>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "ગુજરાતનું પાટનગર કયું છે?",
            a: "અમદાવાદ", b: "ગાંધીનગર", c: "સુરત", d: "રાજકોટ",
            correct: "b"
        },
        {
            question: "ભારતનું રાષ્ટ્રીય પક્ષી કયું છે?",
            a: "પોપટ", b: "ચકલી", c: "મોર", d: "કબૂતર",
            correct: "c"
        },
        {
            question: "૫ + ૭ કેટલા થાય?",
            a: "૧૦", b: "૧૧", c: "૧૨", d: "૧૩",
            correct: "c"
        }
    ];

    let currentQuiz = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById('question');
    const optionsContainer = document.getElementById('options');
    const progressEl = document.getElementById('progress');
    const nextBtn = document.getElementById('next-btn');
    const quizBox = document.getElementById('quiz-box');

    function loadQuiz() {
        answered = false;
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const currentData = quizData[currentQuiz];
        questionEl.innerText = `${currentQuiz + 1}. ${currentData.question}`;
        progressEl.innerText = `પ્રશ્ન ${currentQuiz + 1} / ${quizData.length}`;

        ['a', 'b', 'c', 'd'].forEach(letter => {
            const btn = document.createElement('button');
            btn.classList.add('option-btn');
            btn.innerText = currentData[letter];
            btn.setAttribute('data-ans', letter);
            btn.addEventListener('click', selectAnswer);
            optionsContainer.appendChild(btn);
        });
    }

    function selectAnswer(e) {
        if(answered) return;
        answered = true;
        
        const selectedBtn = e.target;
        const userAns = selectedBtn.getAttribute('data-ans');
        const correctAns = quizData[currentQuiz].correct;

        if(userAns === correctAns) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            document.querySelector(`[data-ans="${correctAns}"]`).classList.add('correct');
        }
        nextBtn.style.display = 'block';
    }

    nextBtn.addEventListener('click', () => {
        currentQuiz++;
        if(currentQuiz < quizData.length) {
            loadQuiz();
        } else {
            quizBox.innerHTML = `
                <div class="result-card">
                    <h2>ટેસ્ટ પૂરી થઈ ગઈ!</h2>
                    <p style="font-size: 22px; margin: 20px 0;">તમારો સ્કોર: <strong>${score} / ${quizData.length}</strong></p>
                    <button class="restart-btn" onclick="location.reload()">ફરીથી ટેસ્ટ આપો</button>
                </div>
            `;
        }
    });

    loadQuiz();
</script>

</body>
</html>
