<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ગુજરાતી વ્યાકરણ ક્વિઝ (૫૦ પ્રશ્નો)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --light-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #d5dbdb;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            font-size: 24px;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: #eaeded;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .question {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.6;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--light-color);
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #e5e8e8;
            border-color: #7f8c8d;
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--danger-color) !important;
            color: white;
            border-color: var(--danger-color);
        }

        .next-btn {
            display: block;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover {
            background-color: #d35400;
        }

        .result-container {
            text-align: center;
            display: none;
        }

        .result-score {
            font-size: 48px;
            color: var(--accent-color);
            font-weight: bold;
            margin: 20px 0;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .restart-btn:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>ગુજરાતી વ્યાકરણ ક્વિઝ</h1>
    
    <div id="quiz-active">
        <div class="quiz-header">
            <span id="question-number">પ્રશ્ન: 1/50</span>
            <span id="score-display">સ્કોર: 0</span>
        </div>
        
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question" id="question-text">પ્રશ્ન લોડ થઈ રહ્યો છે...</div>

        <div class="options-container" id="options-container">
            <!-- બટનો અહીં આવશે -->
        </div>

        <button class="next-btn" id="next-btn">આગળનો પ્રશ્ન ➔</button>
    </div>

    <div class="result-container" id="result-container">
        <h2>ક્વિઝ પૂર્ણ થઈ! 🎉</h2>
        <p>ગુજરાતી વ્યાકરણમાં તમારો સ્કોર:</p>
        <div class="result-score" id="final-score">0 / 50</div>
        <p id="result-message"></p>
        <button class="restart-btn" onclick="restartQuiz()">ફરીથી રમો 🔄</button>
    </div>
</div>

<script>
    // ગુજરાતી વ્યાકરણના ૫૦ પ્રશ્નો
    const quizData = [
        { q: "નીચેનામાંથી કઈ જોડણી સાચી છે?", a: ["મુહુર્ત", "મુહૂર્ત", "મૂહૂર્ત", "મુહૂર્ત"], correct: 1 },
        { q: "'જળકમળ છાંડી જાને બાળા' - આ કયો છંદ છે?", a: ["શિખરિણી", "મંદાક્રાન્તા", "ઝૂલણા", "હરિગીત"], correct: 2 },
        { q: "'હિમાલય ભારતનો ઊંચો પર્વત છે' - આ વાક્યમાં 'હિમાલય' કઈ સંજ્ઞા છે?", a: ["જાતિવાચક", "વ્યક્તિવાચક", "દ્રવ્યવાચક", "સમૂહવાચક"], correct: 1 },
        { q: "'ગણેશ' શબ્દની સાચી સંધિ કઈ છે?", a: ["ગણ + ઈશ", "ગણે + શ", "ગણ + એશ", "ગણ + ઇશ"], correct: 0 },
        { q: "'દશાનન' કયો સમાસ છે?", a: ["દ્વિગુ", "બહુવ્રીહિ", "તત્પુરુષ", "દ્વન્દ્વ"], correct: 1 },
        { q: "'કાગળની હોડી' - આમાં 'ની' કઈ વિભક્તિ દર્શાવે છે?", a: ["પ્રથમા", "તૃતીયા", "પંચમી", "ષષ્ઠી (સંબંધ)"], correct: 3 },
        { q: "'લાટ સાહેબ' રૂઢિપ્રયોગનો સાચો અર્થ જણાવો.", a: ["મોટા અમલદાર", "ગરીબ માણસ", "લાડકો દીકરો", "હોશિયાર વ્યક્તિ"], correct: 0 },
        { q: "'રાજાજીએ નોકરને બોલાવ્યો' - આ વાક્યનું પ્રેરક વાક્ય શું થાય?", a: ["રાજાજીએ નોકરને બોલાવડાવ્યો", "નોકર રાજાજી પાસે આવ્યો", "રાજાજીથી નોકર બોલાવાયો", "રાજાજી નોકરને બોલાવે છે"], correct: 0 },
        { q: "'સૂરજ ઊગ્યો અને અંધારું ગયું' - આ કયા પ્રકારનું વાક્ય છે?", a: ["સરળ વાક્ય", "મિશ્ર વાક્ય", "સંયુક્ત વાક્ય", "આજ્ઞાર્થ વાક્ય"], correct: 2 },
        { q: "'કમળ જેવો કોમળ હાથ' - આમાં કયો અલંકાર છે?", a: ["રૂપક", "ઉપમા", "ઉત્પ્રેક્ષા", "અન્વય"], correct: 1 },
        { q: "'મનહર' છંદના અક્ષરો કેટલા હોય છે?", a: ["૧૭", "૩૧", "૩૨", "૨૧"], correct: 1 },
        { q: "નીચેનામાંથી કયો શબ્દ 'પવન' નો સમાનાર્થી નથી?", a: ["સમીર", "અનિલ", "વાયુ", "અનલ"], correct: 3 },
        { q: "'તિમિર' શબ્દનો વિરોધી શબ્દ જણાવો.", a: ["અંધકાર", "પ્રકાશ", "રાત્રિ", "શાંતિ"], correct: 1 },
        { q: "'જેના ભાગ્યમાં જે લખ્યું હોય તે મળે' - આ કયું સર્વનામ છે?", a: ["દર્શક", "સાપેક્ષ", "અનિશ્ચિત", "પ્રશ્નવાચક"], correct: 1 },
        { q: "નીચેનામાંથી કયો સ્વારક્ષર (સ્વર) દીર્ઘ છે?", a: ["અ", "ઇ", "ઉ", "ઊ"], correct: 3 },
        { q: "'આંખ આડા કાન કરવા' રૂઢિપ્રયોગનો અર્થ શો થાય?", a: ["કાન બંધ કરવા", "ધ્યાન ન આપવું (બેદરકારી)", "કાન લાંબા કરવા", "આંખો મીંચી દેવી"], correct: 1 },
        { q: "'પંકજ' શબ્દ કયો સમાસ દર્શાવે છે?", a: ["ઉપપદ", "મધ્યમપદલોપી", "કર્મધારય", "અવ્યયીભાવ"], correct: 0 },
        { q: "'ગાય દૂધ આપે છે' - આમાં 'આપે છે' એ કયું ક્રિયાપદ છે?", a: ["અકર્મક", "સકર્મક", "દ્વિકર્મક", "સહાયકારક"], correct: 1 },
        { q: "'રસ્તે ચાલતાં સંભાળવું' - આ વાક્યમાં 'ચાલતાં' એ કયું કૃદંત છે?", a: ["વર્તમાન કૃદંત", "ભૂત કૃદંત", "ભવિષ્ય કૃદંત", "સંબંધક ભૂતકૃદંત"], correct: 0 },
        { q: "'તેણે ચોપડી ફાડી નાખી' - આ વાક્યનું કર્મણિ વાક્ય બનાવો.", a: ["તે ચોપડી ફાડે છે", "તેનાથી ચોપડી ફાડી નંખાઈ", "તેણે ચોપડી ફાડવી પડી", "તેના દ્વારા ચોપડી ફાડાશે"], correct: 1 },
        { q: "'કવિશ્વર' શબ્દની સાચી સંધિ છૂટી પાડો.", a: ["કવિ + ઇશ્વર", "કવી + ઈશ્વર", "કવિ + ઈશ્વર", "કવ + ઈશ્વર"], correct: 2 },
        { q: "શબ્દસમૂહ માટે એક શબ્દ: 'જેની પત્ની મરણ પામી હોય તે પુરુષ'", a: ["વિધવા", "વિધુર", "અવિવાહિત", "સધવા"], correct: 1 },
        { q: "'રામે રાવણને બાણથી માર્યો' - આમાં 'બાણથી' કયું કારક (વિભક્તિ) છે?", a: ["કર્તા", "કર્મ", "કરણ (સાધન)", "અપાદાન"], correct: 2 },
        { q: "નીચેનામાંથી કયો શબ્દ રવાનુકારી છે?", a: ["ધીમે-ધીમે", "ટપ-ટપ", "કાળું-ધોળું", "આવ-જા"], correct: 1 },
        { q: "'ઉપમેય' અને 'ઉપમાન' ને એક જ દર્શાવવામાં આવે ત્યારે કયો અલંકાર બને?", a: ["ઉપમા", "રૂપક", "વ્યતિરેક", "શ્લેષ"], correct: 1 },
        { q: "નીચેનામાંથી કયો કાવ્યપ્રકાર મૂળ જાપાનનો છે?", a: ["ગઝલ", "હાઇકુ", "સોનેટ", "મુક્તક"], correct: 1 },
        { q: "ગુજરાતી ભાષામાં મુખ્ય કેટલા લિંગ (જાતિ) પ્રચલિત છે?", a: ["બે", "ત્રણ", "ચાર", "પાંચ"], correct: 1 },
        { q: "'સૂર્ય' શબ્દનું સ્ત્રીલિંગ રૂપ શું થાય?", a: ["સૂર્યાણી", "સૂર્યા", "સૂર્યી", "સૂર્યિકા"], correct: 1 },
        { q: "'શબ્દકોશ' ના ક્રમ પ્રમાણે પ્રથમ કયો અક્ષર આવે?", a: ["અ", "ક", "ક્ષ", "અં"], correct: 3 },
        { q: "'પૃથ્વી' છંદમાં અક્ષરો કેટલા હોય છે?", a: ["૧૫", "૧૭", "૧૯", "૨૧"], correct: 1 },
        { q: "'માતા-પિતા' કયા સમાસનું ઉદાહરણ છે?", a: ["તત્પુરુષ", "દ્વન્દ્વ", "કર્મધારય", "બહુવ્રીહિ"], correct: 1 },
        { q: "'નયન' શબ્દની સંધિ છૂટી પાડો.", a: ["નય + અન", "ને + અન", "નૈ + અન", "ન + અયન"], correct: 1 },
        { q: "'જ્યાં સુધી જીવીશ ત્યાં સુધી ભણીશ' - આ કયું અવ્યય છે?", a: ["સ્થળવાચક", "સમયવાચક (કાળવાચક)", "રીતિવાચક", "હેતુવાચક"], correct: 1 },
        { q: "નીચેનામાંથી કયો ધ્વનિ 'કંઠ્ય' ધ્વનિ છે?", a: ["ત", "ચ", "પ", "ક"], correct: 3 },
        { q: "'રાજાજી આજે પધારશે જ' - આ વાક્યમાં 'જ' શું દર્શાવે છે?", a: ["કૃદંત", "નિપાત", "સર્વનામ", "સંજ્ઞા"], correct: 1 },
        { q: "'વદન સુધાકર જેવું રે લોલ' - આમાં 'સુધાકર' નો અર્થ શું થાય?", a: ["સૂર્ય", "ચંદ્ર", "તારો", "આકાશ"], correct: 1 },
        { q: "'ખાતર ઉપર દીવેલ' કહેવતનો સાચો અર્થ જણાવો.", a: ["નુકસાનમાં વધુ નુકસાન થવું", "ખૂબ ફાયદો થવો", "સમયસર મદદ મળવી", "નવી વસ્તુ ખરીદવી"], correct: 0 },
        { q: "'મંગળ મંદિર ખોલો, દયામય!' - આ કયો છંદ છે?", a: ["અનુષ્ટુપ", "ચોપાઈ", "દોહરો", "ઝૂલણા"], correct: 0 },
        { q: "શબ્દસમૂહ માટે એક શબ્દ: 'તિથિ નક્કી કર્યા વિના આવનાર'", a: ["મહેમાન", "અતિથિ", "આગંતુક", "સ્વજન"], correct: 1 },
        { q: "'મેઘાણીજી રાષ્ટ્રીય શાયર હતા' - આમાં 'રાષ્ટ્રીય' શબ્દ શું દર્શાવે છે?", a: ["ગુણવાચક વિશેષણ", "સંખ્યાવાચક વિશેષણ", "સર્વનામ", "ક્રિયાપદ"], correct: 0 },
        { q: "'હું પરીક્ષામાં પાસ થયો' - આ વાક્યમાં 'હું' કયો પુરુષ દર્શાવે છે?", a: ["પ્રથમ પુરુષ એકવચન", "બીજો પુરુષ એકવચન", "ત્રીજો પુરુષ બહુવચન", "પ્રથમ પુરુષ બહુવચન"], correct: 0 },
        { q: "'પર્વત' શબ્દનું બહુવચન શું થાય?", a: ["પર્વતો", "પર્વતે", "પર્વતોઓ", "પર્વત"], correct: 0 },
        { q: "'સજ્જન' શબ્દનો વિરોધી શબ્દ આપો.", a: ["દુર્જન", "ખરાબ", "દુષ્ટ", "અસજ્જન"], correct: 0 },
        { q: "'સંદેશા' શબ્દનું એકવચન શું થાય?", a: ["સંદેશ", "સંદેશો", "સંદેશી", "સંદેશા"], correct: 1 },
        { q: "નીચેનામાંથી સાચી જોડણી કઈ છે?", a: ["જિજ્ઞાસા", "જીજ્ઞાશા", "જીજ્ઞાસા", "જિજ્ઞાશા"], correct: 0 },
        { q: "'ખાડો ખોદે તે પડે' - આ વાક્યમાં કયા પ્રકારનું સર્વનામ વપરાયું છે?", a: ["દર્શક", "સાપેક્ષ", "અનિશ્ચિત", "નિજવાચક"], correct: 1 },
        { q: "'લતા મંગેશકર કોકિલકંઠી હતા' - આમાં કયો અલંકાર છે?", a: ["ઉપમા", "રૂપક", "અતિશયોક્તિ", "વ્યતિરેક"], correct: 1 },
        { q: "'મહેશ રડવા લાગ્યો' - આ વાક્યમાં 'રડવા' કયું કૃદંત છે?", a: ["સામાન્ય / હેત્વર્થ કૃદંત", "વર્તમાન કૃદંત", "ભૂત કૃદંત", "ભવિષ્ય કૃદંત"], correct: 0 },
        { q: "'ગંગા નદી પવિત્ર છે' - આ વાક્યમાં 'પવિત્ર' શું છે?", a: ["સંજ્ઞા", "વિશેષણ", "ક્રિયાપદ", "સર્વનામ"], correct: 1 },
        { q: "'શ્રીકૃષ્ણ અર્જુનના સારથિ બન્યા' - આમાં 'સારથિ' ની સાચી જોડણી કઈ છે?", a: ["સારથી", "સારથિ", "સારથીઇ", "સારથીય"], correct: 1 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const nextBtn = document.getElementById("next-btn");
    const questionNumber = document.getElementById("question-number");
    const scoreDisplay = document.getElementById("score-display");
    const progressBar = document.getElementById("progress-bar");
    
    const quizActive = document.getElementById("quiz-active");
    const resultContainer = document.getElementById("result-container");
    const finalScore = document.getElementById("final-score");
    const resultMessage = document.getElementById("result-message");

    function startQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        quizActive.style.display = "block";
        resultContainer.style.display = "none";
        scoreDisplay.textContent = `સ્કોર: ${score}`;
        showQuestion();
    }

    function showQuestion() {
        resetState();
        let currentQuestion = quizData[currentQuestionIndex];
        
        questionNumber.textContent = `પ્રશ્ન: ${currentQuestionIndex + 1}/${quizData.length}`;
        const progressPercentage = ((currentQuestionIndex) / quizData.length) * 100;
        progressBar.style.width = `${progressPercentage}%`;

        questionText.textContent = `${currentQuestionIndex + 1}. ${currentQuestion.q}`;

        currentQuestion.a.forEach((option, index) => {
            const button = document.createElement("button");
            button.textContent = option;
            button.classList.add("option-btn");
            button.addEventListener("click", () => selectOption(button, index));
            optionsContainer.appendChild(button);
        });
    }

    function resetState() {
        nextBtn.style.display = "none";
        while (optionsContainer.firstChild) {
            optionsContainer.removeChild(optionsContainer.firstChild);
        }
    }

    function selectOption(selectedBtn, selectedIndex) {
        const correctIndex = quizData[currentQuestionIndex].correct;
        const allButtons = optionsContainer.getElementsByClassName("option-btn");

        for (let btn of allButtons) {
            btn.disabled = true;
        }

        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add("correct");
            score++;
            scoreDisplay.textContent = `સ્કોર: ${score}`;
        } else {
            selectedBtn.classList.add("wrong");
            allButtons[correctIndex].classList.add("correct");
        }

        nextBtn.style.display = "block";
    }

    nextBtn.addEventListener("click", () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    });

    function showResult() {
        progressBar.style.width = "100%";
        quizActive.style.display = "none";
        resultContainer.style.display = "block";
        finalScore.textContent = `${score} / ${quizData.length}`;

        if (score >= 40) {
            resultMessage.textContent = "ઉત્કૃષ્ટ પરિણામ! તમારું વ્યાકરણ જ્ઞાન ખૂબ જ પાકું છે. ✍️✨";
            resultMessage.style.color = "var(--success-color)";
        } else if (score >= 25) {
            resultMessage.textContent = "ખૂબ સરસ પ્રયત્ન! થોડું પુનરાવર્તન કરશો એટલે પૂરા માર્ક્સ આવશે. 📚";
            resultMessage.style.color = "#3498db";
        } else {
            resultMessage.textContent = "હજુ વ્યાકરણમાં વધારે મહાવરાની જરૂર છે. ફરીથી પ્રયત્ન કરો! 📖";
            resultMessage.style.color = "var(--danger-color)";
        }
    }

    function restartQuiz() {
        startQuiz();
    }
 startQuiz();
</script>

</html>
